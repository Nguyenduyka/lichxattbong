<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lịch Làm Việc Số</title>
<script>
// GitHub Pages Routing Trick
// Khi truy cập lichlamviec.com.vn/taytrabong:
// 1. GitHub Pages không tìm thấy file → trả về 404.html
// 2. 404.html lưu path vào sessionStorage rồi redirect về /
// 3. index.html đọc lại path từ sessionStorage → load đúng xã
(function(){
  var path = window.location.pathname;
  // Lưu path gốc để index.html đọc lại
  try{ sessionStorage.setItem('llv_redirect', path); }catch(e){}
  // Redirect về trang chủ
  window.location.replace('/');
})();
</script>
</head>
<body></body>
</html>
